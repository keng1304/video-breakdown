<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 320" width="1200" height="320" role="img" aria-label="出口影像 video-breakdown">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0e0e10"/>
      <stop offset="100%" stop-color="#1a1a1f"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#e8c896"/>
      <stop offset="100%" stop-color="#a67c52"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="320" fill="url(#bg)"/>

  <!-- Film strip perforations (top + bottom) -->
  <g fill="#2a2a30">
    <rect x="0"  y="0" width="1200" height="14"/>
    <rect x="0" y="306" width="1200" height="14"/>
  </g>
  <g fill="#0e0e10">
    <!-- top holes -->
    <rect x="30"  y="3" width="20" height="8" rx="2"/>
    <rect x="90"  y="3" width="20" height="8" rx="2"/>
    <rect x="150" y="3" width="20" height="8" rx="2"/>
    <rect x="210" y="3" width="20" height="8" rx="2"/>
    <rect x="270" y="3" width="20" height="8" rx="2"/>
    <rect x="330" y="3" width="20" height="8" rx="2"/>
    <rect x="390" y="3" width="20" height="8" rx="2"/>
    <rect x="450" y="3" width="20" height="8" rx="2"/>
    <rect x="510" y="3" width="20" height="8" rx="2"/>
    <rect x="570" y="3" width="20" height="8" rx="2"/>
    <rect x="630" y="3" width="20" height="8" rx="2"/>
    <rect x="690" y="3" width="20" height="8" rx="2"/>
    <rect x="750" y="3" width="20" height="8" rx="2"/>
    <rect x="810" y="3" width="20" height="8" rx="2"/>
    <rect x="870" y="3" width="20" height="8" rx="2"/>
    <rect x="930" y="3" width="20" height="8" rx="2"/>
    <rect x="990" y="3" width="20" height="8" rx="2"/>
    <rect x="1050" y="3" width="20" height="8" rx="2"/>
    <rect x="1110" y="3" width="20" height="8" rx="2"/>
    <rect x="1170" y="3" width="20" height="8" rx="2"/>
    <!-- bottom holes -->
    <rect x="30"  y="309" width="20" height="8" rx="2"/>
    <rect x="90"  y="309" width="20" height="8" rx="2"/>
    <rect x="150" y="309" width="20" height="8" rx="2"/>
    <rect x="210" y="309" width="20" height="8" rx="2"/>
    <rect x="270" y="309" width="20" height="8" rx="2"/>
    <rect x="330" y="309" width="20" height="8" rx="2"/>
    <rect x="390" y="309" width="20" height="8" rx="2"/>
    <rect x="450" y="309" width="20" height="8" rx="2"/>
    <rect x="510" y="309" width="20" height="8" rx="2"/>
    <rect x="570" y="309" width="20" height="8" rx="2"/>
    <rect x="630" y="309" width="20" height="8" rx="2"/>
    <rect x="690" y="309" width="20" height="8" rx="2"/>
    <rect x="750" y="309" width="20" height="8" rx="2"/>
    <rect x="810" y="309" width="20" height="8" rx="2"/>
    <rect x="870" y="309" width="20" height="8" rx="2"/>
    <rect x="930" y="309" width="20" height="8" rx="2"/>
    <rect x="990" y="309" width="20" height="8" rx="2"/>
    <rect x="1050" y="309" width="20" height="8" rx="2"/>
    <rect x="1110" y="309" width="20" height="8" rx="2"/>
    <rect x="1170" y="309" width="20" height="8" rx="2"/>
  </g>

  <!-- Brand mark -->
  <text x="80" y="130" font-family="-apple-system, 'Helvetica Neue', 'PingFang TC', sans-serif" font-size="28" font-weight="300" fill="#6b6b73" letter-spacing="8">TZUKAO · 出口影像</text>

  <!-- Main title -->
  <text x="80" y="200" font-family="-apple-system, 'Helvetica Neue', 'PingFang TC', sans-serif" font-size="72" font-weight="700" fill="#f5f5f0" letter-spacing="2">video-breakdown</text>

  <!-- Tagline -->
  <text x="80" y="245" font-family="-apple-system, 'Helvetica Neue', 'PingFang TC', sans-serif" font-size="20" font-weight="400" fill="url(#accent)" letter-spacing="1">把任何一支影片 · 拆成可複製的結構</text>

  <!-- Version chip -->
  <g transform="translate(1020, 175)">
    <rect x="0" y="0" width="120" height="36" rx="18" fill="none" stroke="url(#accent)" stroke-width="1.5"/>
    <text x="60" y="23" font-family="-apple-system, 'Helvetica Neue', sans-serif" font-size="14" font-weight="500" fill="url(#accent)" text-anchor="middle" letter-spacing="2">v1.0</text>
  </g>
</svg>
